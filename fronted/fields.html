<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игровые поля | Catopoly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/MainMenu.css">
    <link rel="stylesheet" href="/static/profile_styles.css">
    <style>

        .field-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #3C4C37;
            color: white;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .field-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .field-tab.active {
            background: #BFDBAE;
            color: #1A261B;
            border-color: #BFDBAE;
        }

        .board-display {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            /* ДОБАВЛЕН ОТСТУП ТУТ */
            margin-top: 30px;
        }

        .board-image-container {
            width: 80vh;
            height: 80vh;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 5px solid #3C4C37;
            transition: 0.5s ease-in-out;
        }

        .board-info {
            text-align: center;
        }

        .board-title {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .board-desc {
            color: #839680;
            font-size: 18px;
            max-width: 600px;
        }
    </style>
</head>
<body>
<div class="app-container">
  <!-- ЛЕВЫЙ САЙДБАР (КОПИЯ ИЗ ПРОФИЛЯ) -->
  <aside class="sidebar">
    <div class="logo">CATOPOLY</div>
    <nav class="nav-menu">
      <a href="/" class="nav-item"><i class="fa-solid fa-house"></i> Главная</a>
      <a href="/api/search" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Поиск игры</a>
      <a href="/api/friends" class="nav-item"><i class="fa-solid fa-user-group"></i> Друзья</a>
      <a href="/profile" class="nav-item"><i class="fa-solid fa-user"></i> Профиль</a>
      <a href="/api/fields" class="nav-item active"><i class="fa-solid fa-border-all"></i> Игровые поля</a>
    </nav>
  </aside>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <main class="main-content">
    <header class="top-bar">
      <div class="capsule-wrapper"><div class="title-capsule">Игровые поля</div></div>
      <div class="player-section">
          <div class="player-info">
              <div class="avatar-box" style="background-image: url('{{ user.avatar_url if user.avatar_url else '/static/default_cat.png' }}');"></div>
              <span class="player-name">{{ user.username }}</span>
          </div>
          <a href="/logout"><i class="fa-solid fa-arrow-right-from-bracket logout-btn"></i></a>
      </div>
    </header>

    <div class="content-body" style="justify-content: flex-start; align-items: center; padding-top: 0;">

        <!-- ОТОБРАЖЕНИЕ ВЫБРАННОГО ПОЛЯ -->
        <div class="board-display">
            <div id="boardImage" class="board-image-container" style="background-image: url('/uploads/pole.png');"></div>
        </div>

    </div>
  </main>
</div>

<script>
    // Данные для вкладок
    const fieldsData = {
        classic: {
            title: "Классическое поле",
            image: "/uploads/pole.png"
        }
    };

    function switchField(element, fieldKey) {
        document.querySelectorAll('.field-tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');

        const data = fieldsData[fieldKey];
        document.getElementById('boardImage').style.backgroundImage = `url('${data.image}')`;
        document.getElementById('boardTitle').innerText = data.title;
        document.getElementById('boardDesc').innerText = data.desc;
    }
</script>

<script src="/static/global_sync.js"></script>
</body>
</html>
